<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <!-- Esta línea es clave para que funcione en móviles -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>House Gaming</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        menu: ['Montserrat', 'sans-serif']
                    }
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .menu-item {
                @apply text-white font-medium tracking-wider;
            }
        }
    </style>
</head>
<body class="m-0 p-0 w-full h-screen overflow-hidden">
    <div class="relative w-full h-screen">
        <!-- Imagen de fondo -->
        <img 
            src="1781057909260.png" 
            alt="House Gaming" 
            class="w-full h-full object-cover object-center"
            loading="lazy"
        >

        <!-- Menú adaptable para PC y celular -->
        <nav class="absolute top-0 right-0 w-full p-4 md:p-8">
            <ul class="flex flex-wrap justify-end gap-6 md:gap-12 text-base md:text-xl menu-item">
                <li>Home</li>
                <li>Juegos</li>
                <li>Apps</li>
                <li>Peliculas</li>
            </ul>
        </nav>
    </div>
</body>
</html>
