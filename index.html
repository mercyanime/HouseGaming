<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>House Gaming</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #ff2222; /* Rojo exterior */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh; /* Ocupa todo el alto de la pantalla */
            padding: 10px; /* Pequeño margen para que no toque los bordes en móviles */
        }

        .contenedor {
            width: 90%;
            /* EL CAMBIO PRINCIPAL: Ya no usamos altura fija, usamos máximos relativos */
            max-width: 1920px;   /* Ancho máximo para pantallas grandes */
            max-height: 90vh;    /* Alto máximo: 90% de la altura de la pantalla */
            background-color: #ff4444; /* Rojo interior */
            border: 8px solid #ff0000; /* Borde rojo */
            border-radius: 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        img {
            width: 100%;
            height: 100%;
            object-fit: contain; /* ESTO ES CLAVE: La imagen se escala manteniendo su forma, se ve completa siempre */
            display: block;
        }
    </style>
</head>
<body>

    <div class="contenedor">
        <img src="house-gaming.png" alt="House Gaming">
    </div>

</body>
</html>
