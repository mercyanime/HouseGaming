<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi primera web</title>

    <!-- AQUÍ VA LA CONFIGURACIÓN DE ESTILOS (CSS) -->
    <style>
        /* Aquí seleccionamos la etiqueta <body>, que es TODO el contenido visible de la página */
        body {
            /* Propiedad para definir el color de fondo */
            background-color: #000000; /* #000000 es el código hexadecimal para negro puro */
            /* O también puedes escribirlo directamente: background-color: black; */

            /* Como el fondo es negro, cambiamos el color del texto para que se vea bien */
            color: #ffffff; /* #ffffff = blanco */

            /* Quitamos el margen por defecto que traen las páginas */
            margin: 0;
        }
    </style>
</head>
<body>
    <h1>¡Hola desde mi web en GitHub!</h1>
    <p>Esto es mi primer sitio, hecho por mí 😎</p>
</body>
</html>
