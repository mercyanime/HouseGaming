<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>House Gaming</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #ff2222; /* Color rojo exterior */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .contenedor {
            width: 90%;
            max-width: 1280px;
            height: 720px;
            background-color: #ff4444; /* Color rojo interior */
            border: 8px solid #ff0000; /* Borde rojo fuerte */
            border-radius: 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        img {
            width: 100%;
            height: 100%;
            object-fit: contain; /* Para que no se recorte ni deforme */
        }
    </style>
</head>
<body>

    <div class="contenedor">
        <img src="house gaming.png" alt="House Gaming">
    </div>

</body>
</html>
