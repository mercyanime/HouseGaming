<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>House Gaming</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { menu: ['Montserrat', 'sans-serif'] }
                }
            }
        };
        // Esto hace que cada enlace muestre una página blanca SIN crear archivos aparte
        function mostrarPagina(nombre) {
            document.body.innerHTML = `
            <style>body{margin:0;padding:0;background:#ffffff;font-family:Arial}</style>
            <h1 style="padding:2rem;text-align:center;color:#222;">${nombre}</h1>
            <p style="text-align:center;">Página en blanco lista para editar</p>
            <div style="text-align:center;margin-top:2rem;">
                <a href="javascript:location.reload()" style="padding:0.7rem 1.5rem;background:#222;color:white;text-decoration:none;border-radius:4px;">Volver al inicio</a>
            </div>`;
        }
    </script>
</head>
<body class="m-0 p-0 w-full h-screen overflow-hidden">
    <!-- PÁGINA PRINCIPAL -->
    <div class="w-full h-screen relative">
        <img 
            src="1781057909260.png" 
            alt="House Gaming" 
            class="w-full h-full object-cover object-center"
        >
        <nav class="absolute top-0 right-0 w-full p-4 md:p-8">
            <ul class="flex flex-wrap justify-end gap-6 md:gap-12 text-base md:text-xl text-white font-medium tracking-wider">
                <li><a href="javascript:mostrarPagina('Home')" class="hover:opacity-80">Home</a></li>
                <li><a href="javascript:mostrarPagina('Juegos')" class="hover:opacity-80">Juegos</a></li>
                <li><a href="javascript:mostrarPagina('Apps')" class="hover:opacity-80">Apps</a></li>
                <li><a href="javascript:mostrarPagina('Peliculas')" class="hover:opacity-80">Peliculas</a></li>
            </ul>
        </nav>
    </div>
</body>
</html>
