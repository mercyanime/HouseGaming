<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>House Gaming</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #ff2222; /* Rojo exterior */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh; /* Ocupa el 100% de la altura de CUALQUIER pantalla */
            width: 100vw; /* Ocupa el 100% del ancho de CUALQUIER pantalla */
            padding: 10px; /* Pequeño margen para que no toque los bordes */
        }

        .contenedor {
            width: 95%; /* 95% del ancho de la pantalla actual */
            height: 95vh; /* 95% de la altura de la pantalla actual */
            background-color: #ff4444; /* Rojo interior */
            border: 8px solid #ff0000; /* Borde rojo */
            border-radius: 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        img {
            width: 100%;
            height: 100%;
            object-fit: contain; /* CLAVE: Se ve COMPLETA, SIN RECORTES, SIN DEFORMARSE */
            display: block;
        }
    </style>
</head>
<body>
    <div class="contenedor">
        <img src="house gaming.png" alt="House Gaming">
    </div>
</body>
</html>
