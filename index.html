<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>House Gaming</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            /* Elimina cualquier margen o relleno del cuerpo */
            margin: 0;
            padding: 0;
            overflow: hidden; /* Evita barras de desplazamiento */
        }

        img {
            width: 100vw;  /* Ancho total de la ventana */
            height: 100vh; /* Alto total de la ventana */
            object-fit: cover; /* Hace que la imagen cubra todo sin deformarse */
            display: block;
        }
    </style>
</head>
<body>

    <!-- Solo la imagen, ocupando toda la pantalla -->
    <img src="house gaming.png" alt="House Gaming">

</body>
</html>
