<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diseño Web</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            /* Tamaño total de la página */
            width: 1534px;
            height: 960px;
            /* Fondo oscuro */
            background-color: #0a0e17;
            position: relative;
            overflow: hidden;
        }

        /* Barra lateral rosa */
        .barra-lateral {
            width: 40px;
            height: 100%;
            background-color: #f52080;
            position: absolute;
            left: 0;
            top: 0;
        }

        /* Recuadro blanco */
        .recuadro-blanco {
            width: 280px;
            height: 220px;
            background-color: #ffffff;
            border-radius: 12px; /* Esquinas redondeadas */
            position: absolute;
            left: 70px;
            top: 40px;
        }
    </style>
</head>
<body>
    <div class="barra-lateral"></div>
    <div class="recuadro-blanco"></div>
</body>
</html>
